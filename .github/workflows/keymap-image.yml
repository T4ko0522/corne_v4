name: Render keymap SVG

on:
  push:
    branches: [main]
    paths:
      - "corne.vil"
      - "keymap/vial.json"
      - "scripts/vil_to_svg.py"
      - ".github/workflows/keymap-image.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Render SVG
        run: |
          python scripts/vil_to_svg.py corne.vil -o assets/keymap.svg

      - name: Commit updated SVG
        run: |
          if git diff --quiet -- assets/keymap.svg; then
            echo "No SVG changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/keymap.svg
          git commit -m "chore: regenerate keymap SVG [skip ci]"
          git push
